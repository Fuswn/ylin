<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ylin</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/themes.css" />
  <link rel="stylesheet" href="styles/editor.css" />
  <link rel="stylesheet" href="styles/preview.css" />
  <link rel="stylesheet" href="styles/file-tree.css" />
  <link rel="stylesheet" href="styles/toolbar.css" />
  <!-- markdown-it (local) -->
  <script src="lib/markdown-it.min.js"></script>
  <!-- highlight.js (local, full bundle with all languages) -->
  <link rel="stylesheet" href="lib/hljs-github-dark.css" id="hljs-theme" />
  <script src="lib/highlight.min.js"></script>
</head>
<body class="theme-dark">
  <!-- Title bar -->
  <div id="titlebar">
    <div id="titlebar-left">
      <div id="menu-bar">
        <div class="menu-item" data-menu="file">
          <span>文件</span>
          <div class="menu-dropdown" id="menu-file">
            <div class="menu-action" data-action="new-file"><span>新建</span><span class="shortcut">Ctrl+N</span></div>
            <div class="menu-action" data-action="open-file"><span>打开文件</span><span class="shortcut">Ctrl+O</span></div>
            <div class="menu-action" data-action="open-folder"><span>打开文件夹</span><span class="shortcut">Ctrl+Shift+O</span></div>
            <div class="menu-separator"></div>
            <div class="menu-action" data-action="save"><span>保存</span><span class="shortcut">Ctrl+S</span></div>
            <div class="menu-action" data-action="save-as"><span>另存为</span><span class="shortcut">Ctrl+Shift+S</span></div>
            <div class="menu-separator"></div>
            <div class="menu-action" data-action="close-folder"><span>关闭文件夹</span></div>
          </div>
        </div>
        <div class="menu-item" data-menu="export">
          <span>导出</span>
          <div class="menu-dropdown" id="menu-export">
            <div class="menu-action" data-action="export-pdf"><span>导出 PDF</span></div>
            <div class="menu-action" data-action="export-html"><span>导出 HTML</span></div>
          </div>
        </div>
        <div class="menu-item" data-menu="view">
          <span>视图</span>
          <div class="menu-dropdown" id="menu-view">
            <div class="menu-action" data-action="toggle-tree"><span>切换文件树</span><span class="shortcut">Ctrl+B</span></div>
            <div class="menu-action" data-action="toggle-preview"><span>切换预览</span><span class="shortcut">Ctrl+P</span></div>
          </div>
        </div>
        <div class="menu-item" data-menu="help">
          <span>帮助</span>
          <div class="menu-dropdown" id="menu-help">
            <div class="menu-action" data-action="about"><span>关于</span></div>
          </div>
        </div>
      </div>
    </div>
    <div id="titlebar-center">
      <span id="title-text">ylin</span>
    </div>
    <div id="titlebar-right">
      <div id="theme-switcher">
        <button class="theme-btn active" data-theme="dark" title="深色主题">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="theme-btn" data-theme="light" title="浅色主题">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="theme-btn" data-theme="sepia" title="护眼主题">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <label id="reading-mode-label">
        <input type="checkbox" id="reading-mode-toggle" />
        <span>阅读模式</span>
      </label>
    </div>
  </div>

  <!-- Main content -->
  <div id="main-container">
    <!-- File tree sidebar -->
    <div id="sidebar" class="sidebar">
      <div id="sidebar-header">
        <button id="btn-go-up" title="上级目录">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span id="folder-name">未打开文件夹</span>
        <button id="btn-switch-drive" title="切换驱动器">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        </button>
      </div>
      <div id="file-tree"></div>
      <div id="drive-list" class="hidden"></div>
    </div>

    <!-- Resize handle -->
    <div id="resize-handle"></div>

    <!-- Editor + Preview area -->
    <div id="editor-area">
      <!-- Markdown toolbar -->
      <div id="md-toolbar">
        <button class="tb-btn" data-action="h1" title="一级标题">H1</button>
        <button class="tb-btn" data-action="h2" title="二级标题">H2</button>
        <button class="tb-btn" data-action="h3" title="三级标题">H3</button>
        <button class="tb-btn" data-action="h4" title="四级标题">H4</button>
        <button class="tb-btn" data-action="h5" title="五级标题">H5</button>
        <span class="tb-sep"></span>
        <button class="tb-btn" data-action="bold" title="粗体 (Ctrl+B)"><b>B</b></button>
        <button class="tb-btn" data-action="italic" title="斜体 (Ctrl+I)"><i>I</i></button>
        <button class="tb-btn" data-action="strikethrough" title="删除线"><s>S</s></button>
        <button class="tb-btn" data-action="inline-code" title="行内代码"><code>&lt;/&gt;</code></button>
        <span class="tb-sep"></span>
        <button class="tb-btn" data-action="code-block" title="代码块">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
        <button class="tb-btn" data-action="blockquote" title="引用块">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
        </button>
        <button class="tb-btn" data-action="hr" title="分割线">&mdash;</button>
        <span class="tb-sep"></span>
        <button class="tb-btn" data-action="ul" title="无序列表">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button class="tb-btn" data-action="ol" title="有序列表">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
        </button>
        <span class="tb-sep"></span>
        <button class="tb-btn" data-action="link" title="链接 (Ctrl+K)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <button class="tb-btn" data-action="image" title="图片">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <button class="tb-btn" data-action="table" title="表格">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </button>
      </div>

      <!-- Search bar -->
      <div id="search-bar" class="hidden">
        <input type="text" id="search-input" placeholder="查找..." spellcheck="false" />
        <span id="search-count"></span>
        <button id="search-prev" title="上一个 (Shift+Enter)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <button id="search-next" title="下一个 (Enter)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <button id="search-close" title="关闭 (Esc)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Editor & Preview panels -->
      <div id="panels-container">
        <div id="editor-panel">
          <div id="line-numbers"></div>
          <textarea id="editor" spellcheck="false" placeholder="在此输入 Markdown 内容..."></textarea>
        </div>
        <div id="preview-panel" class="hidden">
          <div id="preview-content"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="status-file">就绪</span>
    <span id="status-right">
      <span id="status-lines">行: 0</span>
      <span id="status-chars">字符: 0</span>
    </span>
  </div>

  <!-- Drag overlay -->
  <div id="drag-overlay" class="hidden">
    <div id="drag-overlay-content">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <polyline points="9 15 12 12 15 15"/>
      </svg>
      <p>拖放 Markdown 文件到此处</p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/themes.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/preview.js"></script>
  <script src="js/file-tree.js"></script>
  <script src="js/toolbar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
